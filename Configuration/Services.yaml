services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Mfd\Ai\FileMetadata\:
    resource: '../Classes/'

  Mfd\Ai\FileMetadata\Command\GenerateAltTextsCommand:
    tags:
      - name: console.command
        command: ai:generate-alt-texts
  Mfd\Ai\FileMetadata\EventListener\EnrichFileMetadataAfterCreation:
    tags:
      - name: event.listener
  Mfd\Ai\FileMetadata\Services\FalCursor: ~

  # Dashboard Widgets
  dashboard.widget.aiTokenUsageChart:
    class: 'TYPO3\CMS\Dashboard\Widgets\BarChartWidget'
    arguments:
      $dataProvider: '@Mfd\Ai\FileMetadata\Widgets\Provider\TokenUsageChartDataProvider'
    tags:
      - name: dashboard.widget
        identifier: 'aiTokenUsageChart'
        groupNames: 'ai'
        title: 'LLL:EXT:ai_filemetadata/Resources/Private/Language/locallang_be.xlf:widget.tokenUsageChart.title'
        description: 'LLL:EXT:ai_filemetadata/Resources/Private/Language/locallang_be.xlf:widget.tokenUsageChart.description'
        iconIdentifier: 'content-widget-chart-bar'
        height: 'medium'
        width: 'medium'

  dashboard.widget.aiTotalTokens:
    class: 'Mfd\Ai\FileMetadata\Widgets\TotalTokensWidget'
    arguments:
      $dataProvider: '@Mfd\Ai\FileMetadata\Widgets\Provider\TotalTokensDataProvider'
    tags:
      - name: dashboard.widget
        identifier: 'aiTotalTokens'
        groupNames: 'ai'
        title: 'LLL:EXT:ai_filemetadata/Resources/Private/Language/locallang_be.xlf:widget.totalTokens.title'
        description: 'LLL:EXT:ai_filemetadata/Resources/Private/Language/locallang_be.xlf:widget.totalTokens.description'
        iconIdentifier: 'content-widget-number'
        height: 'small'
        width: 'small'

  dashboard.widget.aiTokenUsagePerUser:
    class: 'Mfd\Ai\FileMetadata\Widgets\TokenUsagePerUserWidget'
    arguments:
      $dataProvider: '@Mfd\Ai\FileMetadata\Widgets\Provider\TokenUsagePerUserDataProvider'
    tags:
      - name: dashboard.widget
        identifier: 'aiTokenUsagePerUser'
        groupNames: 'ai'
        title: 'LLL:EXT:ai_filemetadata/Resources/Private/Language/locallang_be.xlf:widget.tokenUsagePerUser.title'
        description: 'LLL:EXT:ai_filemetadata/Resources/Private/Language/locallang_be.xlf:widget.tokenUsagePerUser.description'
        iconIdentifier: 'content-widget-list'
        height: 'medium'
        width: 'medium'
